<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Value Investing</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #657080;
      --paper: #f7f4ee;
      --panel: #ffffff;
      --line: #d9d2c7;
      --accent: #1f6f78;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--paper);
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0 64px;
    }

    header {
      display: grid;
      gap: 10px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.2rem);
      line-height: 1;
      font-weight: 750;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 720px;
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      margin-top: 28px;
    }

    figure {
      margin: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 40px rgb(35 31 26 / 0.08);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      background: #e7e1d8;
    }

    figcaption {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .number {
      color: var(--accent);
      font-weight: 700;
    }

    footer {
      margin-top: 36px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 22px, 1180px);
        padding: 28px 0 44px;
      }

      .gallery {
        grid-template-columns: 1fr;
        gap: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <h1>Value Investing</h1>
      <p class="subtitle">A 14-image visual collection on value investing, arranged for easy reading and sharing.</p>
    </header>
