<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Option Slides</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --paper: #f7f4ee;
      --panel: #ffffff;
      --line: #d9d2c7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--paper);
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0 64px;
    }

    .gallery {
      display: grid;
      gap: 28px;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 40px rgb(35 31 26 / 0.08);
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 22px, 1180px);
        padding: 28px 0 44px;
      }

      .gallery {
        gap: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="gallery" aria-label="Option slide image sequence">
      <img src="option-assets/op1.png" alt="Option slide 1">
      <img src="option-assets/op2.png" alt="Option slide 2">
      <img src="option-assets/op3.png" alt="Option slide 3">
      <img src="option-assets/op4.png" alt="Option slide 4">
      <img src="option-assets/op5.png" alt="Option slide 5">
      <img src="option-assets/op6.png" alt="Option slide 6">
      <img src="option-assets/op7.png" alt="Option slide 7">
      <img src="option-assets/op8.png" alt="Option slide 8">
      <img src="option-assets/op9.png" alt="Option slide 9">
      <img src="option-assets/op10.png" alt="Option slide 10">
      <img src="option-assets/op11.png" alt="Option slide 11">
    </section>
  </main>
</body>
</html>
