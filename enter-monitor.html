<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>進場監控清單</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--text:#e6edf3;--dim:#8b949e;--mid:#dde4eb;--purple:#c084fc;--purple-dim:#7c3aed;--purple-bg:#1a1230;--green:#4ade80;--yellow:#fbbf24;--red:#f87171;--blue:#60a5fa}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button,input,select,textarea{font-family:inherit}

/* ── Header ── */
.header{background:linear-gradient(135deg,#161b22,#1a1230);border-bottom:1px solid var(--border);padding:20px 16px 16px}
.header-sub{font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:4px}
.header-top{display:flex;justify-content:space-between;align-items:center;gap:12px}
.header-title{font-family:'DM Serif Display',serif;font-size:24px;color:#f0f6fc}
.header-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.btn-sm{padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--mid);font-size:11px;cursor:pointer;letter-spacing:.5px;white-space:nowrap}
.btn-sm:hover{color:#fff;border-color:var(--mid)}
.btn-add{padding:6px 14px;background:var(--purple-dim);border:1px solid var(--purple-dim);border-radius:5px;color:#fff;font-size:11px;cursor:pointer;letter-spacing:.5px;white-space:nowrap;font-weight:600}
.btn-add:hover{background:#6d28d9;border-color:#6d28d9}

/* ── Layout ── */
.content{padding:20px 16px 60px;max-width:860px;margin:0 auto}

/* ── Empty state ── */
.empty{text-align:center;padding:64px 16px;color:var(--dim)}
.empty-icon{font-size:32px;margin-bottom:12px}
.empty-title{font-size:15px;font-weight:600;color:var(--mid);margin-bottom:6px}
.empty-desc{font-size:13px;line-height:1.7}

/* ── Entry card ── */
.entry-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden;transition:.2s}
.entry-card:hover{border-color:#444c56}
.entry-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
.entry-status{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.status-waiting{background:var(--yellow)}
.status-ready{background:var(--green)}
.status-passed{background:var(--dim)}
.entry-ticker{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:#fff;min-width:80px}
.entry-name{font-size:13px;color:var(--dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entry-type-badge{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:4px;font-weight:700;white-space:nowrap}
.type-stock{background:#0d2137;color:var(--blue)}
.type-call{background:#1a2d0d;color:var(--green)}
.type-put{background:#2d0d0d;color:var(--red)}
.type-other{background:var(--surface2);color:var(--dim)}
.entry-chevron{color:var(--dim);font-size:12px;transition:transform .2s;flex-shrink:0}
.entry-card.open .entry-chevron{transform:rotate(180deg)}

/* ── Entry body ── */
.entry-body{display:none;border-top:1px solid var(--border);padding:16px}
.entry-card.open .entry-body{display:block}

.section-label{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);font-weight:700;margin-bottom:10px}

.conditions-list{margin-bottom:16px}
.condition-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.condition-item:last-child{border-bottom:none}
.cond-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:.15s}
.cond-check.checked{background:var(--purple-dim);border-color:var(--purple-dim)}
.cond-check.checked::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.cond-text{font-size:13px;color:var(--text);line-height:1.6;flex:1}
.cond-text.checked-text{color:var(--dim);text-decoration:line-through}

.notes-box{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px;font-size:13px;color:var(--mid);line-height:1.75;white-space:pre-wrap;min-height:40px}
.notes-box:empty::before{content:'（無備註）';color:var(--dim)}

.entry-meta{display:flex;gap:16px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.meta-item{font-size:11px;color:var(--dim)}
.meta-item span{color:var(--mid);margin-left:4px}

.entry-actions{display:flex;gap:6px;margin-top:14px}
.btn-edit{padding:5px 12px;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--mid);font-size:11px;cursor:pointer}
.btn-edit:hover{border-color:var(--mid);color:#fff}
.btn-delete{padding:5px 12px;background:transparent;border:1px solid #3a1a1a;border-radius:5px;color:#f87171;font-size:11px;cursor:pointer}
.btn-delete:hover{background:#2d0d0d}

/* ── Status bar ── */
.status-bar{display:flex;gap:16px;margin-bottom:20px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
.stat{text-align:center}
.stat-num{font-family:'DM Mono',monospace;font-size:20px;font-weight:500}
.stat-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-top:2px}
.stat-waiting .stat-num{color:var(--yellow)}
.stat-ready .stat-num{color:var(--green)}
.stat-passed .stat-num{color:var(--dim)}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-overlay.hidden{display:none}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-title{font-size:15px;font-weight:700;color:#fff}
.modal-close{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;line-height:1}
.modal-close:hover{color:#fff}
.modal-body{padding:20px}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid var(--border)}

.form-field{margin-bottom:14px}
.form-label{font-size:11px;color:var(--dim);margin-bottom:5px;letter-spacing:.3px;display:block}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:8px 10px;color:var(--text);font-size:13px}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:#7c3aed;box-shadow:0 0 0 2px rgba(124,58,237,.15)}
.form-select{cursor:pointer}
.form-textarea{resize:vertical;line-height:1.65;min-height:80px}
.form-row{display:flex;gap:10px}
.form-row>.form-field{flex:1;min-width:0}

.conditions-editor{border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-top:4px}
.cond-edit-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border)}
.cond-edit-item:last-child{border-bottom:none}
.cond-edit-input{flex:1;background:transparent;border:none;color:var(--text);font-size:13px;padding:2px 0}
.cond-edit-input:focus{outline:none}
.cond-edit-input::placeholder{color:var(--dim)}
.cond-remove{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:2px 4px;line-height:1}
.cond-remove:hover{color:var(--red)}
.cond-add-row{padding:8px 10px;background:transparent;border:none;color:var(--purple);font-size:12px;cursor:pointer;text-align:left;width:100%;letter-spacing:.3px}
.cond-add-row:hover{background:var(--surface2)}

.btn-cancel{padding:7px 16px;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--mid);font-size:12px;cursor:pointer}
.btn-cancel:hover{border-color:var(--mid);color:#fff}
.btn-save{padding:7px 20px;background:var(--purple-dim);border:1px solid var(--purple-dim);border-radius:5px;color:#fff;font-size:12px;cursor:pointer;font-weight:600}
.btn-save:hover{background:#6d28d9}

/* ── Filter bar ── */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:5px 14px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--dim);font-size:12px;cursor:pointer;transition:.15s}
.filter-btn:hover{border-color:var(--mid);color:var(--mid)}
.filter-btn.active{background:var(--purple-dim);border-color:var(--purple-dim);color:#fff}
</style>
</head>
<body>

<div class="header">
  <div class="header-sub">utopiawrite · 交易監控</div>
  <div class="header-top">
    <div class="header-title">進場監控清單</div>
    <div class="header-actions">
      <button class="btn-sm" onclick="exportData()">備份</button>
      <button class="btn-sm" onclick="document.getElementById('importFile').click()">匯入</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      <button class="btn-add" onclick="openModal()">＋ 新增標的</button>
    </div>
  </div>
</div>

<div class="content">

  <div class="status-bar">
    <div class="stat stat-waiting">
      <div class="stat-num" id="countWaiting">0</div>
      <div class="stat-label">等待中</div>
    </div>
    <div class="stat stat-ready">
      <div class="stat-num" id="countReady">0</div>
      <div class="stat-label">條件達成</div>
    </div>
    <div class="stat stat-passed">
      <div class="stat-num" id="countPassed">0</div>
      <div class="stat-label">已過期 / 放棄</div>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">全部</button>
    <button class="filter-btn" onclick="setFilter('waiting', this)">等待中</button>
    <button class="filter-btn" onclick="setFilter('ready', this)">條件達成</button>
    <button class="filter-btn" onclick="setFilter('passed', this)">已過期 / 放棄</button>
  </div>

  <div id="entriesList"></div>

</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="modalOverlay" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle">新增監控標的</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-field">
          <label class="form-label">代號 (Ticker)</label>
          <input class="form-input" id="fTicker" placeholder="e.g. NVDA">
        </div>
        <div class="form-field">
          <label class="form-label">名稱</label>
          <input class="form-input" id="fName" placeholder="e.g. Nvidia">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label class="form-label">交易類型</label>
          <select class="form-select" id="fType">
            <option value="stock">買股票 (Stock)</option>
            <option value="call">買 Call</option>
            <option value="put">買 Put</option>
            <option value="other">其他</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label">狀態</label>
          <select class="form-select" id="fStatus">
            <option value="waiting">等待中</option>
            <option value="ready">條件達成</option>
            <option value="passed">已過期 / 放棄</option>
          </select>
        </div>
      </div>
      <div class="form-field">
        <label class="form-label">進場條件（逐條列出）</label>
        <div class="conditions-editor" id="conditionsEditor"></div>
        <button class="cond-add-row" onclick="addConditionField()">＋ 新增條件</button>
      </div>
      <div class="form-field">
        <label class="form-label">備註 / 操作邏輯</label>
        <textarea class="form-textarea" id="fNotes" placeholder="記錄投資邏輯、目標價位、風險考量等…"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveEntry()">儲存</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'enter_monitor_v1';
let entries = [];
let editingId = null;
let currentFilter = 'all';

function load() {
  try { entries = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { entries = []; }
  render();
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const list = document.getElementById('entriesList');
  const filtered = currentFilter === 'all' ? entries : entries.filter(e => e.status === currentFilter);

  document.getElementById('countWaiting').textContent = entries.filter(e => e.status === 'waiting').length;
  document.getElementById('countReady').textContent = entries.filter(e => e.status === 'ready').length;
  document.getElementById('countPassed').textContent = entries.filter(e => e.status === 'passed').length;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">⏳</div>
      <div class="empty-title">${currentFilter === 'all' ? '尚無監控標的' : '此分類無資料'}</div>
      <div class="empty-desc">${currentFilter === 'all' ? '點擊右上角「＋ 新增標的」開始記錄' : '切換到其他篩選查看'}</div>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(e => {
    const statusClass = { waiting: 'status-waiting', ready: 'status-ready', passed: 'status-passed' }[e.status] || 'status-waiting';
    const typeClass = { stock: 'type-stock', call: 'type-call', put: 'type-put', other: 'type-other' }[e.type] || 'type-other';
    const typeLabel = { stock: 'Stock', call: 'Call', put: 'Put', other: '其他' }[e.type] || e.type;
    const checkedCount = (e.conditions || []).filter(c => c.checked).length;
    const totalCount = (e.conditions || []).length;
    const condSummary = totalCount > 0 ? `${checkedCount}/${totalCount} 條件` : '';

    const conditionsHtml = (e.conditions || []).map((c, ci) => `
      <div class="condition-item">
        <div class="cond-check ${c.checked ? 'checked' : ''}" onclick="toggleCondition('${e.id}', ${ci})"></div>
        <div class="cond-text ${c.checked ? 'checked-text' : ''}">${escHtml(c.text)}</div>
      </div>`).join('');

    return `<div class="entry-card" id="card-${e.id}">
      <div class="entry-head" onclick="toggleCard('${e.id}')">
        <div class="entry-status ${statusClass}"></div>
        <div class="entry-ticker">${escHtml(e.ticker)}</div>
        <div class="entry-name">${escHtml(e.name)}${condSummary ? ' · ' + condSummary : ''}</div>
        <div class="entry-type-badge ${typeClass}">${typeLabel}</div>
        <div class="entry-chevron">▼</div>
      </div>
      <div class="entry-body">
        ${totalCount > 0 ? `<div class="section-label">進場條件</div>
        <div class="conditions-list">${conditionsHtml}</div>` : ''}
        <div class="section-label">備註 / 操作邏輯</div>
        <div class="notes-box">${escHtml(e.notes || '')}</div>
        <div class="entry-meta">
          <div class="meta-item">建立<span>${formatDate(e.createdAt)}</span></div>
          ${e.updatedAt ? `<div class="meta-item">更新<span>${formatDate(e.updatedAt)}</span></div>` : ''}
        </div>
        <div class="entry-actions">
          <button class="btn-edit" onclick="openModal('${e.id}')">編輯</button>
          <button class="btn-delete" onclick="deleteEntry('${e.id}')">刪除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  card.classList.toggle('open');
}

function toggleCondition(id, ci) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  e.conditions[ci].checked = !e.conditions[ci].checked;
  if (e.conditions.length > 0 && e.conditions.every(c => c.checked)) {
    e.status = 'ready';
  } else if (e.status === 'ready' && !e.conditions.every(c => c.checked)) {
    e.status = 'waiting';
  }
  e.updatedAt = new Date().toISOString();
  save();
  render();
  setTimeout(() => {
    const card = document.getElementById('card-' + id);
    if (card) card.classList.add('open');
  }, 0);
}

function openModal(id) {
  editingId = id || null;
  document.getElementById('modalTitle').textContent = id ? '編輯監控標的' : '新增監控標的';
  if (id) {
    const e = entries.find(x => x.id === id);
    if (!e) return;
    document.getElementById('fTicker').value = e.ticker;
    document.getElementById('fName').value = e.name;
    document.getElementById('fType').value = e.type;
    document.getElementById('fStatus').value = e.status;
    document.getElementById('fNotes').value = e.notes || '';
    renderConditionFields(e.conditions || []);
  } else {
    document.getElementById('fTicker').value = '';
    document.getElementById('fName').value = '';
    document.getElementById('fType').value = 'stock';
    document.getElementById('fStatus').value = 'waiting';
    document.getElementById('fNotes').value = '';
    renderConditionFields([]);
  }
  document.getElementById('modalOverlay').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
  editingId = null;
}

function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function renderConditionFields(conditions) {
  const editor = document.getElementById('conditionsEditor');
  editor.innerHTML = conditions.map((c, i) => `
    <div class="cond-edit-item">
      <input class="cond-edit-input" placeholder="條件描述，例：價格跌破 $850" value="${escHtml(c.text)}">
      <button class="cond-remove" onclick="removeCondField(this)">✕</button>
    </div>`).join('');
}

function addConditionField() {
  const editor = document.getElementById('conditionsEditor');
  const div = document.createElement('div');
  div.className = 'cond-edit-item';
  div.innerHTML = `<input class="cond-edit-input" placeholder="條件描述，例：RSI 跌破 40"><button class="cond-remove" onclick="removeCondField(this)">✕</button>`;
  editor.appendChild(div);
  div.querySelector('input').focus();
}

function removeCondField(btn) {
  btn.parentElement.remove();
}

function saveEntry() {
  const ticker = document.getElementById('fTicker').value.trim().toUpperCase();
  const name = document.getElementById('fName').value.trim();
  if (!ticker) { alert('請輸入代號'); return; }

  const condInputs = document.querySelectorAll('#conditionsEditor .cond-edit-input');
  const conditions = Array.from(condInputs).map(inp => ({ text: inp.value.trim(), checked: false })).filter(c => c.text);

  if (editingId) {
    const e = entries.find(x => x.id === editingId);
    const oldConds = e.conditions || [];
    conditions.forEach(c => {
      const old = oldConds.find(o => o.text === c.text);
      if (old) c.checked = old.checked;
    });
    e.ticker = ticker;
    e.name = name;
    e.type = document.getElementById('fType').value;
    e.status = document.getElementById('fStatus').value;
    e.conditions = conditions;
    e.notes = document.getElementById('fNotes').value.trim();
    e.updatedAt = new Date().toISOString();
  } else {
    entries.unshift({
      id: uid(),
      ticker,
      name,
      type: document.getElementById('fType').value,
      status: document.getElementById('fStatus').value,
      conditions,
      notes: document.getElementById('fNotes').value.trim(),
      createdAt: new Date().toISOString(),
      updatedAt: null
    });
  }

  save();
  render();
  closeModal();
}

function deleteEntry(id) {
  if (!confirm('確定刪除此標的？')) return;
  entries = entries.filter(e => e.id !== id);
  save();
  render();
}

function exportData() {
  const blob = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'enter-monitor-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error();
      entries = data;
      save();
      render();
      alert('匯入成功，共 ' + data.length + ' 筆資料。');
    } catch { alert('檔案格式錯誤，請確認是正確的備份檔。'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
}

load();
</script>
</body>
</html>
