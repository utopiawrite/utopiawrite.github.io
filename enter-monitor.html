<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交易觀察清單</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --bg2: #181818;
    --bg3: #222;
    --border: #2e2e2e;
    --border2: #444;
    --text: #e8e8e4;
    --text2: #aaa;
    --text3: #666;
    --accent: #c8f06e;
    --accent-dim: rgba(200,240,110,0.12);
    --lc: #6eb5f0;
    --lc-bg: rgba(110,181,240,0.12);
    --sp: #6ee8b0;
    --sp-bg: rgba(110,232,176,0.12);
    --share: #f0c46e;
    --share-bg: rgba(240,196,110,0.12);
    --watch: #aaa;
    --watch-bg: rgba(136,136,136,0.1);
    --red: #e86e6e;
    --red-bg: rgba(232,110,110,0.1);
    --radius: 6px;
    --font: 'DM Mono', 'SF Mono', 'Fira Code', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    min-height: 100vh;
    padding: 40px 24px 80px;
  }

  .container { max-width: 900px; margin: 0 auto; }

  header { margin-bottom: 32px; }
  header h1 {
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 400;
    margin-bottom: 4px;
  }
  header p { font-size: 12px; color: var(--text3); letter-spacing: 0.05em; }

  .add-form {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  input, select, textarea {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--border2); }
  input::placeholder, textarea::placeholder { color: var(--text3); }
  select option { background: var(--bg3); }

  #inp-ticker { width: 80px; text-transform: uppercase; }
  #inp-date { width: 130px; color-scheme: dark; }
  #inp-action { width: 115px; }
  #inp-note { flex: 1; min-width: 140px; }

  .btn-add {
    background: var(--accent-dim);
    border: 0.5px solid var(--accent);
    color: var(--accent);
    font-family: var(--font);
    font-size: 13px;
    padding: 7px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-add:hover { background: rgba(200,240,110,0.22); }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 16px;
  }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .controls label { font-size: 12px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; }

  .sort-btn {
    background: none;
    border: 0.5px solid var(--border);
    color: var(--text2);
    font-family: var(--font);
    font-size: 12px;
    padding: 4px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }
  .sort-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .divider { width: 1px; height: 16px; background: var(--border); align-self: center; }

  #filter-ticker { width: 80px; font-size: 12px; padding: 4px 8px; }
  #filter-action { font-size: 12px; padding: 4px 8px; }

  .btn-edit-mode {
    background: none;
    border: 0.5px solid var(--border);
    color: var(--text2);
    font-family: var(--font);
    font-size: 12px;
    padding: 5px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-edit-mode:hover { border-color: var(--border2); color: var(--text); }
  .btn-edit-mode.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  table { width: 100%; border-collapse: collapse; table-layout: fixed; }

  col.col-ticker { width: 82px; }
  col.col-date   { width: 118px; }
  col.col-action { width: 108px; }
  col.col-note   { width: auto; }
  col.col-del    { width: 36px; }

  thead th {
    text-align: left;
    padding: 8px 12px;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    font-weight: 400;
    border-bottom: 0.5px solid var(--border);
  }

  tbody tr { border-bottom: 0.5px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: var(--bg2); }
  tbody tr.group-start td { border-top: 1px solid var(--border2); }
  tbody td { padding: 10px 12px; vertical-align: top; }

  /* view mode */
  .ticker-label { color: var(--text); font-weight: 400; letter-spacing: 0.05em; font-size: 14px; }
  .ticker-repeat { color: var(--text3); font-size: 12px; padding-top: 2px; }
  .date-cell { color: var(--text2); font-size: 13px; white-space: nowrap; }

  .badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 3px;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 400;
  }
  .badge-LC    { color: var(--lc);    background: var(--lc-bg);    border: 0.5px solid rgba(110,181,240,0.3); }
  .badge-SP    { color: var(--sp);    background: var(--sp-bg);    border: 0.5px solid rgba(110,232,176,0.3); }
  .badge-Share { color: var(--share); background: var(--share-bg); border: 0.5px solid rgba(240,196,110,0.3); }
  .badge-Watch { color: var(--watch); background: var(--watch-bg); border: 0.5px solid #333; }

  .note-cell {
    color: var(--text2);
    font-size: 13px;
    line-height: 1.65;
    word-break: break-word;
    white-space: pre-wrap;
  }

  /* edit mode cells */
  .edit-mode tbody td { padding: 6px 6px; vertical-align: middle; }

  .e-ticker { width: 100%; text-transform: uppercase; font-size: 13px; padding: 5px 7px; }
  .e-date   { width: 100%; font-size: 13px; padding: 5px 7px; color-scheme: dark; }
  .e-action { width: 100%; font-size: 13px; padding: 5px 7px; }
  .e-note   { width: 100%; font-size: 13px; line-height: 1.55; resize: vertical; min-height: 56px; padding: 5px 7px; }

  .btn-del {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 13px;
    padding: 3px 7px;
    border-radius: var(--radius);
    transition: all 0.15s;
    font-family: var(--font);
    color: var(--text3);
    display: none;
  }
  .edit-mode .btn-del { display: inline-block; }
  .btn-del:hover { background: var(--red-bg); color: var(--red); }

  .empty { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; letter-spacing: 0.05em; }
  .status-bar { margin-top: 16px; font-size: 12px; color: var(--text3); letter-spacing: 0.05em; }

  .export-row { margin-top: 32px; display: flex; gap: 8px; }
  .btn-export {
    background: none;
    border: 0.5px solid var(--border);
    color: var(--text2);
    font-family: var(--font);
    font-size: 12px;
    padding: 6px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }
  .btn-export:hover { border-color: var(--border2); color: var(--text); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>交易觀察清單</h1>
    <p>Trading Watchlist — 資料儲存於本機 localStorage</p>
  </header>

  <div class="add-form">
    <input type="text" id="inp-ticker" placeholder="標的" maxlength="10">
    <input type="date" id="inp-date">
    <select id="inp-action">
      <option value="Watch">觀察中</option>
      <option value="LC">LEAP Call</option>
      <option value="SP">Sell Put</option>
      <option value="Share">Buy Share</option>
    </select>
    <input type="text" id="inp-note" placeholder="備註">
    <button class="btn-add" onclick="addRow()">+ 新增</button>
  </div>

  <div class="toolbar">
    <div class="controls">
      <label>排序</label>
      <button class="sort-btn active" id="sort-ticker" onclick="setSort('ticker')">以標的</button>
      <button class="sort-btn" id="sort-date" onclick="setSort('date')">以日期</button>
      <div class="divider"></div>
      <label>篩選</label>
      <select id="filter-action" onchange="render()">
        <option value="">全部</option>
        <option value="Watch">觀察中</option>
        <option value="LC">LEAP Call</option>
        <option value="SP">Sell Put</option>
        <option value="Share">Buy Share</option>
      </select>
      <input type="text" id="filter-ticker" placeholder="標的" oninput="render()">
    </div>
    <button class="btn-edit-mode" id="btn-edit-mode" onclick="toggleEditMode()">編輯</button>
  </div>

  <table id="main-table">
    <colgroup>
      <col class="col-ticker">
      <col class="col-date">
      <col class="col-action">
      <col class="col-note">
      <col class="col-del">
    </colgroup>
    <thead>
      <tr>
        <th>標的</th>
        <th>日期</th>
        <th>操作</th>
        <th>備註</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbl-body"></tbody>
  </table>
  <div id="empty-msg" class="empty" style="display:none;">還沒有紀錄。</div>
  <div class="status-bar" id="status-bar"></div>

  <div class="export-row">
    <button class="btn-export" onclick="exportCSV()">匯出 CSV</button>
  </div>
</div>

<script>
const KEY = 'trading-watchlist-v1';
let rows = [];
let sortMode = 'ticker';
let editMode = false;
const LABELS = { LC: 'LEAP Call', SP: 'Sell Put', Share: 'Buy Share', Watch: '觀察中' };

function load() {
  try {
    const s = localStorage.getItem(KEY);
    if (s) rows = JSON.parse(s);
  } catch(e) { rows = []; }
  document.getElementById('inp-date').value = new Date().toISOString().slice(0,10);
  render();
}

function save() { localStorage.setItem(KEY, JSON.stringify(rows)); }

function setSort(mode) {
  sortMode = mode;
  document.getElementById('sort-ticker').classList.toggle('active', mode === 'ticker');
  document.getElementById('sort-date').classList.toggle('active', mode === 'date');
  render();
}

function toggleEditMode() {
  if (editMode) {
    // save all edits before leaving edit mode
    flushEdits();
  }
  editMode = !editMode;
  const btn = document.getElementById('btn-edit-mode');
  btn.textContent = editMode ? '完成' : '編輯';
  btn.classList.toggle('active', editMode);
  document.getElementById('main-table').classList.toggle('edit-mode', editMode);
  render();
}

function flushEdits() {
  const tbody = document.getElementById('tbl-body');
  const tickers = tbody.querySelectorAll('.e-ticker');
  tickers.forEach(el => {
    const id = el.dataset.id;
    const idx = rows.findIndex(r => r.id === id);
    if (idx < 0) return;
    const row = el.closest('tr');
    rows[idx].ticker = el.value.trim().toUpperCase() || rows[idx].ticker;
    rows[idx].date   = row.querySelector('.e-date').value   || rows[idx].date;
    rows[idx].action = row.querySelector('.e-action').value;
    rows[idx].note   = row.querySelector('.e-note').value.trim();
  });
  save();
}

function getSorted() {
  const fa = document.getElementById('filter-action').value;
  const ft = document.getElementById('filter-ticker').value.toUpperCase().trim();
  let list = rows.filter(r => (!fa || r.action === fa) && (!ft || r.ticker.includes(ft)));
  if (sortMode === 'ticker') {
    list.sort((a,b) => a.ticker.localeCompare(b.ticker) || b.date.localeCompare(a.date));
  } else {
    list.sort((a,b) => b.date.localeCompare(a.date) || a.ticker.localeCompare(b.ticker));
  }
  return list;
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  const list = getSorted();
  const tbody = document.getElementById('tbl-body');
  const empty = document.getElementById('empty-msg');

  if (!list.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    let lastTicker = null;

    tbody.innerHTML = list.map(r => {
      const isNew = sortMode === 'ticker' && r.ticker !== lastTicker;
      if (sortMode === 'ticker') lastTicker = r.ticker;
      const groupClass = isNew ? ' class="group-start"' : '';

      if (editMode) {
        return `<tr${groupClass}>
          <td><input class="e-ticker" data-id="${r.id}" value="${esc(r.ticker)}"></td>
          <td><input type="date" class="e-date" value="${r.date}"></td>
          <td><select class="e-action">
            <option value="Watch"${r.action==='Watch'?' selected':''}>觀察中</option>
            <option value="LC"${r.action==='LC'?' selected':''}>LEAP Call</option>
            <option value="SP"${r.action==='SP'?' selected':''}>Sell Put</option>
            <option value="Share"${r.action==='Share'?' selected':''}>Buy Share</option>
          </select></td>
          <td><textarea class="e-note">${esc(r.note||'')}</textarea></td>
          <td><button class="btn-del" onclick="del('${r.id}')">✕</button></td>
        </tr>`;
      }

      const tickerCell = isNew
        ? `<td class="ticker-label">${r.ticker}</td>`
        : sortMode === 'ticker'
          ? `<td class="ticker-repeat">↳</td>`
          : `<td class="ticker-label">${r.ticker}</td>`;

      return `<tr${groupClass}>
        ${tickerCell}
        <td class="date-cell">${r.date}</td>
        <td><span class="badge badge-${r.action}">${LABELS[r.action]}</span></td>
        <td class="note-cell">${esc(r.note) || '—'}</td>
        <td></td>
      </tr>`;
    }).join('');
  }

  const total = rows.length;
  const shown = list.length;
  document.getElementById('status-bar').textContent =
    `共 ${total} 筆紀錄${shown !== total ? `，目前顯示 ${shown} 筆` : ''}`;
}

function addRow() {
  const ticker = document.getElementById('inp-ticker').value.trim().toUpperCase();
  const date   = document.getElementById('inp-date').value;
  if (!ticker || !date) { document.getElementById('inp-ticker').focus(); return; }
  if (editMode) { flushEdits(); editMode = false; document.getElementById('btn-edit-mode').textContent = '編輯'; document.getElementById('btn-edit-mode').classList.remove('active'); document.getElementById('main-table').classList.remove('edit-mode'); }
  rows.push({
    id: Date.now().toString(), ticker, date,
    action: document.getElementById('inp-action').value,
    note: document.getElementById('inp-note').value.trim()
  });
  save();
  document.getElementById('inp-ticker').value = '';
  document.getElementById('inp-note').value = '';
  render();
}

function del(id) {
  if (!confirm('刪除這筆紀錄？')) return;
  flushEdits();
  rows = rows.filter(r => r.id !== id);
  save(); render();
}

function exportCSV() {
  const header = '標的,日期,操作,備註';
  const body = rows.map(r =>
    `${r.ticker},${r.date},${LABELS[r.action]},"${(r.note||'').replace(/"/g,'""')}"`
  ).join('\n');
  const blob = new Blob(['\uFEFF' + header + '\n' + body], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `trading_watchlist_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

document.getElementById('inp-note').addEventListener('keydown', e => {
  if (e.key === 'Enter') addRow();
});

load();
</script>
</body>
</html>
