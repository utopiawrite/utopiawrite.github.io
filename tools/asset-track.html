<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💼 資產指揮中心</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#F7F4EE;font-family:system-ui,-apple-system,sans-serif;font-size:14px;color:#2C2820}
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
  input,select{outline:none}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#E0DAD0;border-radius:2px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;

const fmt=n=>new Intl.NumberFormat("zh-TW").format(Math.round(Math.abs(n)));
const fmtShort=n=>{
  const a=Math.abs(n),s=n<0?"-":"";
  if(a>=1e8)return s+(a/1e8).toFixed(2)+"億";
  if(a>=1e4)return s+(a/1e4).toFixed(0)+"萬";
  return s+fmt(n);
};
const prevMonth=()=>{const d=new Date(),m=d.getMonth();return m===0?`${d.getFullYear()-1}-12`:`${d.getFullYear()}-${String(m).padStart(2,"0")}`;};
const monthLabel=k=>{const[y,m]=k.split("-");return `${y}年${m}月`;};

const LS={
  get:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
};

const CATS_ASSET=["現金","銀行","電子支付","儲值卡","證券","不動產","其他資產"];
const CATS_LIAB=["信用卡","貸款","其他負債"];
const ALL_CATS=[...CATS_ASSET,...CATS_LIAB];
const CAT_ICONS={現金:"💵",銀行:"🏦",電子支付:"📱",儲值卡:"🎴",證券:"📈",不動產:"🏠",其他資產:"💼",信用卡:"💳",貸款:"🏛️",其他負債:"📋"};

const INIT_FIXED_CATS=[
  {id:"fc1",label:"居住",icon:"🏠"},{id:"fc2",label:"交通",icon:"🚗"},
  {id:"fc3",label:"通訊",icon:"📡"},{id:"fc4",label:"保費",icon:"🛡️"},
  {id:"fc5",label:"生活",icon:"🛒"},{id:"fc6",label:"娛樂",icon:"🎬"},
  {id:"fc7",label:"其他",icon:"📌"},
];
const CAT_EMOJI=["📌","🏠","🚗","✈️","🍽️","💊","🎓","💅","🐾","🎁","💡","🌿","⚙️","📡","🛡️","🛒","🎬","📚","🏋️","💻"];
const INIT_FIXED_INCOME_CATS=[
  {id:"fic1",label:"工作收入",icon:"💼"},{id:"fic2",label:"投資收益",icon:"📈"},
  {id:"fic3",label:"租金收入",icon:"🏠"},{id:"fic4",label:"其他收入",icon:"💰"},
];

const C={
  bg:"#F7F4EE",surface:"#FFFFFF",border:"#E0DAD0",
  text:"#2C2820",sub:"#8A8077",muted:"#BDB4A8",
  accent:"#EDE8DF",
  green:"#6EA896",greenBg:"#E3F0EC",
  red:"#D97B6C",redBg:"#F5E6E3",
  amber:"#C8963A",amberBg:"#F5EDD8",amberBorder:"#E8D5A8",
  lav:"#9B87C0",lavBg:"#EDE9F5",
};

const INIT_ACCOUNTS=[
  {id:"c1",label:"現金",cat:"現金",type:"asset",usd:false},
  {id:"b1",label:"銀行帳戶 1",cat:"銀行",type:"asset",usd:false},
  {id:"b2",label:"銀行帳戶 2",cat:"銀行",type:"asset",usd:false},
  {id:"b6",label:"銀行帳戶 3（USD）",cat:"銀行",type:"asset",usd:true},
  {id:"e1",label:"電子支付 1",cat:"電子支付",type:"asset",usd:false},
  {id:"e2",label:"電子支付 2",cat:"電子支付",type:"asset",usd:false},
  {id:"s1",label:"儲值卡 1",cat:"儲值卡",type:"asset",usd:false},
  {id:"s2",label:"儲值卡 2",cat:"儲值卡",type:"asset",usd:false},
  {id:"v1",label:"國內股票",cat:"證券",type:"asset",usd:false},
  {id:"v2",label:"美股帳戶 1（USD）",cat:"證券",type:"asset",usd:true},
  {id:"v3",label:"美股帳戶 2（USD）",cat:"證券",type:"asset",usd:true},
  {id:"p1",label:"不動產 1",cat:"不動產",type:"asset",usd:false},
  {id:"p2",label:"不動產 2",cat:"不動產",type:"asset",usd:false},
  {id:"p3",label:"不動產 3",cat:"不動產",type:"asset",usd:false},
  {id:"o1",label:"其他資產 1",cat:"其他資產",type:"asset",usd:false},
  {id:"o2",label:"其他資產 2",cat:"其他資產",type:"asset",usd:false},
  {id:"l1",label:"信用卡 1",cat:"信用卡",type:"liability",usd:false},
  {id:"l2",label:"信用卡 2",cat:"信用卡",type:"liability",usd:false},
  {id:"l3",label:"信用卡 3",cat:"信用卡",type:"liability",usd:false},
  {id:"d1",label:"信貸",cat:"貸款",type:"liability",usd:false},
  {id:"d2",label:"車貸",cat:"貸款",type:"liability",usd:false},
  {id:"d3",label:"房貸 1",cat:"貸款",type:"liability",usd:false},
];

const INIT_FIXED=[
  {id:"f1",label:"房貸",cat:"居住"},
  {id:"f2",label:"車貸",cat:"交通"},
  {id:"f3",label:"保險",cat:"保費"},
  {id:"f4",label:"電話費",cat:"通訊"},
  {id:"f5",label:"網路費",cat:"通訊"},
  {id:"f6",label:"水電瓦斯",cat:"居住"},
  {id:"f7",label:"管理費",cat:"居住"},
];

const INIT_FIXED_INCOME=[
  {id:"fi1",label:"工作收入"},
  {id:"fi2",label:"租金收入"},
];

// USD conversion helper — backward compat: old snapshots without _rate already store TWD
const toTwd=(snap,acc,rawVal)=>{
  if(!acc.usd||!snap||!('_rate' in snap)) return rawVal;
  return rawVal*(parseFloat(snap._rate)||1);
};

function App(){
  const [view,setView]=useState("dashboard");
  const [hideNums,setHideNums]=useState(false);
  const [excludeRealty,setExcludeRealty]=useState(false);

  const [accounts,setAccounts]=useState(()=>LS.get("nw_accounts")||INIT_ACCOUNTS);
  const [history,setHistory]=useState(()=>LS.get("nw_history")||{});
  const [form,setForm]=useState({});
  const [usdRate,setUsdRate]=useState("");
  const [editMonth,setEditMonth]=useState(prevMonth());
  const [collapsed,setCollapsed]=useState({});
  const [showAdd,setShowAdd]=useState(false);
  const [newAcc,setNewAcc]=useState({label:"",cat:"銀行",usd:false});
  const [confirmDel,setConfirmDel]=useState(null);
  const [editingAcc,setEditingAcc]=useState(null);
  const [editLabel,setEditLabel]=useState("");

  const [fixedItems,setFixedItems]=useState(()=>{
    const saved=LS.get("nw_fixed_items");
    if(saved) return saved.map(f=>f.cat?f:{...f,cat:"其他"});
    return INIT_FIXED;
  });
  const [fixedAmounts,setFixedAmounts]=useState(()=>LS.get("nw_fixed_amounts")||{});
  const [fixedInputMode,setFixedInputMode]=useState(false);
  const [fixedForm,setFixedForm]=useState({});
  const [showAddFixed,setShowAddFixed]=useState(false);
  const [newFixed,setNewFixed]=useState({label:"",cat:"其他",amount:""});
  const [fixedCollapsed,setFixedCollapsed]=useState({});
  const [fixedCats,setFixedCats]=useState(()=>LS.get("nw_fixed_cats")||INIT_FIXED_CATS);
  const [showManageCats,setShowManageCats]=useState(false);
  const [newCat,setNewCat]=useState({label:"",icon:"📌"});
  const [fixedSubItems,setFixedSubItems]=useState(()=>LS.get("nw_fixed_sub_items")||[]);
  const [addSubParent,setAddSubParent]=useState(null);
  const [newSubLabel,setNewSubLabel]=useState("");
  const [expandedItems,setExpandedItems]=useState({});

  const [fixedIncomeItems,setFixedIncomeItems]=useState(()=>LS.get("nw_fixed_income_items")||INIT_FIXED_INCOME);
  const [fixedIncomeAmounts,setFixedIncomeAmounts]=useState(()=>LS.get("nw_fixed_income_amounts")||{});
  const [fixedIncomeInputMode,setFixedIncomeInputMode]=useState(false);
  const [fixedIncomeForm,setFixedIncomeForm]=useState({});
  const [showAddFixedIncome,setShowAddFixedIncome]=useState(false);
  const [newFixedIncome,setNewFixedIncome]=useState({label:"",cat:"其他收入",amount:""});
  const [fixedIncomeCats,setFixedIncomeCats]=useState(()=>LS.get("nw_fi_cats")||INIT_FIXED_INCOME_CATS);
  const [fixedIncomeSubItems,setFixedIncomeSubItems]=useState(()=>LS.get("nw_fi_sub_items")||[]);
  const [addIncomeSubParent,setAddIncomeSubParent]=useState(null);
  const [newIncomeSubLabel,setNewIncomeSubLabel]=useState("");
  const [expandedIncomeItems,setExpandedIncomeItems]=useState({});
  const [showManageIncomeCats,setShowManageIncomeCats]=useState(false);
  const [newIncomeCat,setNewIncomeCat]=useState({label:"",icon:"💰"});

  useEffect(()=>LS.set("nw_accounts",accounts),[accounts]);
  useEffect(()=>LS.set("nw_history",history),[history]);
  useEffect(()=>LS.set("nw_fixed_items",fixedItems),[fixedItems]);
  useEffect(()=>LS.set("nw_fixed_cats",fixedCats),[fixedCats]);
  useEffect(()=>LS.set("nw_fixed_sub_items",fixedSubItems),[fixedSubItems]);
  useEffect(()=>LS.set("nw_fi_cats",fixedIncomeCats),[fixedIncomeCats]);
  useEffect(()=>LS.set("nw_fi_sub_items",fixedIncomeSubItems),[fixedIncomeSubItems]);
  useEffect(()=>LS.set("nw_fixed_amounts",fixedAmounts),[fixedAmounts]);
  useEffect(()=>LS.set("nw_fixed_income_items",fixedIncomeItems),[fixedIncomeItems]);
  useEffect(()=>LS.set("nw_fixed_income_amounts",fixedIncomeAmounts),[fixedIncomeAmounts]);

  const sortedKeys=Object.keys(history).sort();

  useEffect(()=>{
    if(view==="input"){
      const targetSnap=history[editMonth];
      const prior=Object.keys(history).sort().filter(k=>k<editMonth);
      const priorKey=prior[prior.length-1];
      const sourceSnap=targetSnap||(priorKey?history[priorKey]:null)||{};
      const{_rate,...vals}=sourceSnap;
      setForm(vals);
      setUsdRate(_rate!=null?String(_rate):"");
    }
  },[view,editMonth]);

  const mask=n=>hideNums?"• • • •":fmt(n);
  const maskS=n=>hideNums?"• •":fmtShort(n);

  const exportData=()=>{
    const data={accounts,history,fixedItems,fixedAmounts,fixedCats,fixedSubItems,fixedIncomeItems,fixedIncomeAmounts,fixedIncomeCats,fixedIncomeSubItems,exportedAt:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`資產備份_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
  };

  const importData=()=>{
    const inp=document.createElement("input");
    inp.type="file";inp.accept=".json";
    inp.onchange=e=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();
      r.onload=ev=>{
        try{
          const d=JSON.parse(ev.target.result);
          if(d.accounts) setAccounts(d.accounts);
          if(d.history) setHistory(d.history);
          if(d.fixedItems) setFixedItems(d.fixedItems.map(f=>f.cat?f:{...f,cat:"其他"}));
          if(d.fixedCats) setFixedCats(d.fixedCats);
          if(d.fixedSubItems) setFixedSubItems(d.fixedSubItems);
          if(d.fixedIncomeCats) setFixedIncomeCats(d.fixedIncomeCats);
          if(d.fixedIncomeSubItems) setFixedIncomeSubItems(d.fixedIncomeSubItems);
          if(d.fixedAmounts) setFixedAmounts(d.fixedAmounts);
          if(d.fixedIncomeItems) setFixedIncomeItems(d.fixedIncomeItems);
          if(d.fixedIncomeAmounts) setFixedIncomeAmounts(d.fixedIncomeAmounts);
          alert("✅ 匯入成功！");
        }catch(err){alert("❌ 檔案格式錯誤");}
      };
      r.readAsText(f);
    };
    inp.click();
  };

  // calcSnap: excludeCats removes whole categories; excludeIds removes specific accounts
  const calcSnap=(snap,excludeCats=[],excludeIds=[])=>{
    let assets=0,liabs=0;
    accounts.forEach(a=>{
      if(excludeCats.length&&excludeCats.includes(a.cat)) return;
      if(excludeIds.length&&excludeIds.includes(a.id)) return;
      const v=parseFloat(snap?.[a.id])||0;
      const twdVal=toTwd(snap,a,v);
      a.type==="asset"?(assets+=twdVal):(liabs+=twdVal);
    });
    return{assets,liabs,net:assets-liabs};
  };

  // IDs of mortgage accounts (房貸/增貸) to exclude alongside 不動產 in the toggle
  const realtyLoanIds=accounts
    .filter(a=>a.cat==="貸款"&&(a.label.includes("房貸")||a.label.includes("增貸")))
    .map(a=>a.id);

  const latestKey=sortedKeys[sortedKeys.length-1]||null;
  const prevKey=sortedKeys[sortedKeys.length-2]||null;
  const latestSnap=latestKey?calcSnap(history[latestKey]):null;
  const prevSnap=prevKey?calcSnap(history[prevKey]):null;
  const diff=latestSnap&&prevSnap?latestSnap.net-prevSnap.net:null;
  const pct=diff!==null&&prevSnap&&prevSnap.net!==0?((diff/Math.abs(prevSnap.net))*100).toFixed(1):null;

  const chartData=sortedKeys.slice(-12).map(k=>({
    ...calcSnap(history[k],excludeRealty?["不動產"]:[],excludeRealty?realtyLoanIds:[]),k
  }));
  const maxVal=chartData.length?Math.max(...chartData.map(d=>Math.max(d.assets,d.net)),1):1;

  // FX impact: how much of this month's net change is purely from exchange rate movement
  const fxImpact=(()=>{
    if(!latestKey||!prevKey) return null;
    const curRate=parseFloat(history[latestKey]?._rate);
    const prevRate=parseFloat(history[prevKey]?._rate);
    if(!curRate||!prevRate) return null;
    let usdNetPrev=0;
    accounts.forEach(a=>{
      if(!a.usd) return;
      const pv=parseFloat(history[prevKey]?.[a.id])||0;
      usdNetPrev+=(a.type==="asset"?pv:-pv);
    });
    return usdNetPrev*(curRate-prevRate);
  })();

  // Preview calc for input form
  const calcFormPreview=()=>{
    const rate=parseFloat(usdRate)||0;
    let assets=0,liabs=0;
    accounts.forEach(a=>{
      const v=parseFloat(form[a.id])||0;
      const twdVal=(a.usd&&rate)?v*rate:v;
      a.type==="asset"?(assets+=twdVal):(liabs+=twdVal);
    });
    return{assets,liabs,net:assets-liabs};
  };

  const card={background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,marginBottom:10,overflow:"hidden"};
  const inp={background:C.accent,border:`1px solid ${C.border}`,color:C.text,padding:"7px 10px",borderRadius:8,fontSize:14};
  const overlay="rgba(44,40,32,0.45)";
  const btnPrimary={background:C.text,border:"none",color:C.bg,padding:"7px 14px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600};
  const btnSecondary={background:C.accent,border:`1px solid ${C.border}`,color:C.sub,padding:"7px 14px",borderRadius:8,cursor:"pointer",fontSize:13};

  const NavBtn=({v,label})=>(
    <button onClick={()=>setView(v)} style={{
      background:"transparent",color:view===v?C.text:C.sub,
      border:"none",padding:"8px 12px 6px",cursor:"pointer",fontSize:12,
      fontWeight:view===v?700:400,
      borderBottom:view===v?`2px solid ${C.lav}`:"2px solid transparent",
      transition:"color 0.15s",whiteSpace:"nowrap",
    }}>{label}</button>
  );

  const buildGroups=()=>{
    const catLabels=fixedCats.map(c=>c.label);
    const groups={};
    catLabels.forEach(cat=>{
      const items=fixedItems.filter(f=>(f.cat||"其他")===cat);
      if(items.length) groups[cat]=items;
    });
    fixedItems.forEach(f=>{
      const cat=f.cat||"其他";
      if(!catLabels.includes(cat)){
        if(!groups[cat]) groups[cat]=[];
        if(!groups[cat].find(x=>x.id===f.id)) groups[cat].push(f);
      }
    });
    return groups;
  };
  const getCatIcon=label=>(fixedCats.find(c=>c.label===label)||{icon:"📌"}).icon;
  const getIncomeCatIcon=label=>(fixedIncomeCats.find(c=>c.label===label)||{icon:"💰"}).icon;
  const getIncomeItemTotal=(fid)=>{
    const subs=fixedIncomeSubItems.filter(s=>s.parentId===fid);
    if(subs.length===0) return parseFloat(fixedIncomeAmounts[fid])||0;
    return subs.reduce((s,sub)=>s+(parseFloat(fixedIncomeAmounts[sub.id])||0),0);
  };
  const buildIncomeGroups=()=>{
    const catLabels=fixedIncomeCats.map(c=>c.label);
    const groups={};
    catLabels.forEach(cat=>{
      const items=fixedIncomeItems.filter(f=>(f.cat||"其他收入")===cat);
      if(items.length) groups[cat]=items;
    });
    fixedIncomeItems.forEach(f=>{
      const cat=f.cat||"其他收入";
      if(!catLabels.includes(cat)){
        if(!groups[cat]) groups[cat]=[];
        if(!groups[cat].find(x=>x.id===f.id)) groups[cat].push(f);
      }
    });
    return groups;
  };
  const getItemTotal=(fid)=>{
    const subs=fixedSubItems.filter(s=>s.parentId===fid);
    if(subs.length===0) return parseFloat(fixedAmounts[fid])||0;
    return subs.reduce((s,sub)=>s+(parseFloat(fixedAmounts[sub.id])||0),0);
  };

  return (
    <div style={{background:C.bg,minHeight:"100vh",color:C.text}}>

      {/* ── Header ── */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"10px 16px 0",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
          <span style={{fontSize:17}}>💼</span>
          <span style={{fontWeight:700,fontSize:15,flex:1,letterSpacing:"-0.3px"}}>資產指揮中心</span>
          <button onClick={()=>setHideNums(h=>!h)} style={{
            background:hideNums?C.lav:C.accent,
            border:`1px solid ${hideNums?C.lav:C.border}`,
            color:hideNums?"#fff":C.sub,
            padding:"5px 10px",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:600,
          }}>{hideNums?"👁 顯示金額":"🙈 隱藏金額"}</button>
          <button onClick={importData} style={{...btnSecondary,padding:"5px 8px",fontSize:11}}>📥 匯入</button>
          <button onClick={exportData} style={{...btnPrimary,padding:"5px 10px",fontSize:11}}>📤 備份</button>
        </div>
        <div style={{display:"flex",gap:0,overflowX:"auto",scrollbarWidth:"none"}}>
          <NavBtn v="dashboard" label="📊 總覽"/>
          <NavBtn v="manage"    label="⚙️ 設定帳戶"/>
          <NavBtn v="input"     label="✏️ 更新"/>
          <NavBtn v="fixed"     label="📌 固定支出"/>
          <NavBtn v="fixedincome" label="💰 固定收入"/>
        </div>
      </div>

      <div style={{padding:16,maxWidth:660,margin:"0 auto"}}>

        {/* ══════════════════════════════ DASHBOARD ══════════════════════════════ */}
        {view==="dashboard"&&(
          !latestSnap?(
            <div style={{textAlign:"center",padding:60,color:C.muted}}>
              <div style={{fontSize:48,marginBottom:12}}>📊</div>
              <div style={{marginBottom:6,color:C.sub}}>還沒有資料</div>
              <div style={{fontSize:12}}>點「✏️ 更新」填入數字</div>
            </div>
          ):<>
            {/* Hero card */}
            <div style={{background:"linear-gradient(135deg, #6B8A8A 0%, #7A9080 100%)",borderRadius:14,padding:"22px 24px",marginBottom:14,color:"#fff"}}>
              <div style={{fontSize:11,opacity:.55,marginBottom:4,letterSpacing:"0.06em"}}>淨資產 · {monthLabel(latestKey)}</div>
              <div style={{fontSize:36,fontWeight:700,letterSpacing:"-1.5px",lineHeight:1.1}}>
                {hideNums?"• • • • • •":`TWD ${fmt(latestSnap.net)}`}
              </div>
              {diff!==null&&<div style={{marginTop:10}}>
                <div style={{fontSize:12,background:"rgba(255,255,255,0.1)",display:"inline-flex",alignItems:"center",gap:6,padding:"4px 12px",borderRadius:20}}>
                  <span>{diff>=0?"▲":"▼"}</span>
                  <span>{hideNums?"• •":`${diff>=0?"+":"-"}TWD ${fmt(diff)}`}</span>
                  {pct&&!hideNums&&<span style={{opacity:.6}}>({pct}%)</span>}
                  <span style={{opacity:.5}}>vs 上月</span>
                </div>
                {fxImpact!==null&&!hideNums&&(
                  <div style={{marginTop:5,fontSize:11,opacity:.65,paddingLeft:2}}>
                    匯率影響 {fxImpact>=0?"+":""}{fmtShort(fxImpact)} · 實際變動 {(diff-fxImpact)>=0?"+":""}{fmtShort(diff-fxImpact)}
                  </div>
                )}
              </div>}
              <div style={{display:"flex",gap:24,marginTop:16,paddingTop:14,borderTop:"1px solid rgba(255,255,255,0.12)"}}>
                <div>
                  <div style={{fontSize:11,opacity:.5,marginBottom:2}}>資產合計</div>
                  <div style={{fontSize:16,fontWeight:600}}>{maskS(latestSnap.assets)}</div>
                </div>
                <div>
                  <div style={{fontSize:11,opacity:.5,marginBottom:2}}>負債合計</div>
                  <div style={{fontSize:16,fontWeight:600}}>{maskS(latestSnap.liabs)}</div>
                </div>
              </div>
            </div>

            {/* Trend chart */}
            {chartData.length>1&&<div style={{...card,padding:16,marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",marginBottom:14}}>

                  border:`1px solid ${excludeRealty?C.lav:C.border}`,

              </div>
              <div style={{display:"flex",alignItems:"flex-end",gap:4,height:88}}>
                {chartData.map((d,i)=>{
                  const minVal=Math.min(...chartData.map(x=>x.net));
                  const range=maxVal-(minVal<0?minVal:0);
                  const base=range>0?(d.net-(minVal<0?minVal:0))/range:0.5;
                  const h=Math.max(4,base*80);
                  const up=i===0||d.net>=chartData[i-1].net;
                  const isNow=i===chartData.length-1;
                  const barColor=isNow?C.lav:up?C.green:C.red;
                  const[,m]=d.k.split("-");

                  </div>;
                })}
              </div>
            </div>}

            {/* Category breakdown */}
            {ALL_CATS.map(cat=>{
              const accs=accounts.filter(a=>a.cat===cat);

              const total=accs.reduce((s,a)=>{

                </div>

                  const twdAccs=accs.filter(a=>!a.usd);
                  const usdAccs=accs.filter(a=>a.usd);
                  const hasBoth=twdAccs.length>0&&usdAccs.length>0;
                  const renderRow=a=>{
                    const vRaw=parseFloat(curSnap?.[a.id])||0;
                    const v=toTwd(curSnap,a,vRaw);
                    const pvRaw=prvSnap!=null?parseFloat(prvSnap?.[a.id])||0:null;
                    const pv=pvRaw!==null?toTwd(prvSnap,a,pvRaw):null;
                    const d=pv!==null?v-pv:null;
                    return <div key={a.id} style={{display:"flex",alignItems:"center",padding:"9px 16px 9px 44px",borderTop:`1px solid ${C.border}`}}>

                        <span style={{color:C.sub,fontSize:13}}>{a.label}</span>
                        {a.usd&&<span style={{fontSize:10,background:C.amberBg,color:C.amber,border:`1px solid ${C.amberBorder}`,padding:"1px 5px",borderRadius:5,fontWeight:600}}>USD</span>}
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontWeight:600,color:v?C.text:C.muted,fontSize:13}}>{v?mask(v):"—"}</div>

                      </div>

                  return <>
                    {twdAccs.map(renderRow)}

                    {usdAccs.map(renderRow)}

                })()}
              </div>;
            })}

            {/* History table */}
            {sortedKeys.length>1&&<div style={{...card,padding:16}}>
              <div style={{fontSize:12,color:C.sub,marginBottom:10,fontWeight:600,letterSpacing:"0.04em"}}>歷史記錄</div>

                <thead><tr style={{color:C.muted}}>
                  <td style={{paddingBottom:8}}>月份</td>
                  <td style={{textAlign:"right"}}>資產</td>
                  <td style={{textAlign:"right"}}>負債</td>

                  <td style={{textAlign:"right"}}>增減</td>
                </tr></thead>
                <tbody>{sortedKeys.slice().reverse().map((k,i,arr)=>{
                  const t=calcSnap(history[k]),pk=arr[i+1],pt=pk?calcSnap(history[pk]):null,d=pt?t.net-pt.net:null;

        {/* ══════════════════════════════ INPUT ══════════════════════════════ */}
        {view==="input"&&<>

        {/* ══════════════════════════════ FIXED EXPENSES ══════════════════════════════ */}

              <div style={{fontSize:12,opacity:.5,marginTop:6}}>{fixedItems.filter(f=>getItemTotal(f.id)>0).length} 項固定支出 · {Object.keys(groups).length} 個類別</div>

          const groups=buildIncomeGroups();

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>

                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:14}}>{cat}</div>
                    {catPct>0&&!hideNums&&<div style={{fontSize:11,color:C.muted,marginTop:1}}>佔總收入 {catPct}%</div>}
                  </div>

                      onClick={()=>hasSubs&&setExpandedIncomeItems(p=>({...p,[f.id]:!itemOpen}))}>
                      <div style={{flex:1}}>
                        <span style={{color:C.sub,fontSize:13}}>{f.label}</span>
                        {hasSubs&&<span style={{marginLeft:6,fontSize:10,color:C.muted}}>({subs.length} 細項)</span>}
                      </div>

      {/* Manage income cats */}
      {showManageIncomeCats&&<div style={{position:"fixed",inset:0,background:overlay,display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200}}>
        <div style={{background:C.surface,borderRadius:"16px 16px 0 0",padding:24,width:"100%",maxWidth:660,maxHeight:"80vh",overflowY:"auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <div style={{fontWeight:700,fontSize:16}}>管理收入類別</div>
            <button onClick={()=>setShowManageIncomeCats(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:C.muted}}>✕</button>
          </div>
          {fixedIncomeCats.map((c,i)=><div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderTop:i>0?`1px solid ${C.border}`:"none"}}>
            <span style={{fontSize:18,width:28}}>{c.icon}</span>
            <span style={{flex:1,fontWeight:500}}>{c.label}</span>
            <span style={{fontSize:12,color:C.muted,marginRight:6}}>{fixedIncomeItems.filter(f=>(f.cat||"其他收入")===c.label).length} 項</span>
            <button onClick={()=>{
              const hasItems=fixedIncomeItems.some(f=>(f.cat||"其他收入")===c.label);
              if(hasItems){alert(`「${c.label}」下還有項目，請先刪除再刪類別`);return;}
              setFixedIncomeCats(p=>p.filter(x=>x.id!==c.id));
            }} style={{background:C.accent,border:`1px solid ${C.border}`,color:C.red,padding:"3px 10px",borderRadius:6,cursor:"pointer",fontSize:12}}>刪除</button>
          </div>)}
          <div style={{marginTop:16,paddingTop:16,borderTop:`1px solid ${C.border}`}}>
            <div style={{fontSize:12,color:C.sub,marginBottom:10,fontWeight:600}}>新增類別</div>
            <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
              {CAT_EMOJI.map(e=><button key={e} onClick={()=>setNewIncomeCat(p=>({...p,icon:e}))}
                style={{width:34,height:34,fontSize:18,background:newIncomeCat.icon===e?C.green:C.accent,border:`1px solid ${newIncomeCat.icon===e?C.green:C.border}`,borderRadius:8,cursor:"pointer"}}>{e}</button>)}
            </div>
            <div style={{display:"flex",gap:8}}>
              <input value={newIncomeCat.label} onChange={e=>setNewIncomeCat(p=>({...p,label:e.target.value}))}
                onKeyDown={e=>{if(e.key==="Enter"&&newIncomeCat.label.trim()){setFixedIncomeCats(p=>[...p,{id:"fic_"+Date.now(),label:newIncomeCat.label.trim(),icon:newIncomeCat.icon}]);setNewIncomeCat({label:"",icon:"💰"});}}}
                placeholder="類別名稱" style={{...inp,flex:1}}/>
              <button onClick={()=>{
                if(!newIncomeCat.label.trim())return;
                setFixedIncomeCats(p=>[...p,{id:"fic_"+Date.now(),label:newIncomeCat.label.trim(),icon:newIncomeCat.icon}]);
                setNewIncomeCat({label:"",icon:"💰"});
              }} style={{...btnPrimary,background:C.green,padding:"7px 16px"}}>新增</button>
            </div>
          </div>
        </div>
      </div>}

      {/* Manage fixed expense cats */}
      {showManageCats&&<div style={{position:"fixed",inset:0,background:overlay,display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200}}>
        <div style={{background:C.surface,borderRadius:"16px 16px 0 0",padding:24,width:"100%",maxWidth:660,maxHeight:"80vh",overflowY:"auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <div style={{fontWeight:700,fontSize:16}}>管理支出類別</div>
            <button onClick={()=>setShowManageCats(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:C.muted}}>✕</button>
          </div>
          {fixedCats.map((c,i)=><div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderTop:i>0?`1px solid ${C.border}`:"none"}}>
            <span style={{fontSize:18,width:28}}>{c.icon}</span>
            <span style={{flex:1,fontWeight:500}}>{c.label}</span>
            <span style={{fontSize:12,color:C.muted,marginRight:6}}>{fixedItems.filter(f=>(f.cat||"其他")===c.label).length} 項</span>
            <button onClick={()=>{
              const hasItems=fixedItems.some(f=>(f.cat||"其他")===c.label);
              if(hasItems){alert(`「${c.label}」下還有項目，請先刪除或移動再刪類別`);return;}
              setFixedCats(p=>p.filter(x=>x.id!==c.id));
            }} style={{background:C.accent,border:`1px solid ${C.border}`,color:C.red,padding:"3px 10px",borderRadius:6,cursor:"pointer",fontSize:12}}>刪除</button>
          </div>)}
          <div style={{marginTop:16,paddingTop:16,borderTop:`1px solid ${C.border}`}}>
            <div style={{fontSize:12,color:C.sub,marginBottom:10,fontWeight:600}}>新增類別</div>
            <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
              {CAT_EMOJI.map(e=><button key={e} onClick={()=>setNewCat(p=>({...p,icon:e}))}
                style={{width:34,height:34,fontSize:18,background:newCat.icon===e?C.lav:C.accent,border:`1px solid ${newCat.icon===e?C.lav:C.border}`,borderRadius:8,cursor:"pointer"}}>{e}</button>)}
            </div>
            <div style={{display:"flex",gap:8}}>
              <input value={newCat.label} onChange={e=>setNewCat(p=>({...p,label:e.target.value}))}
                onKeyDown={e=>{if(e.key==="Enter"&&newCat.label.trim()){setFixedCats(p=>[...p,{id:"fc_"+Date.now(),label:newCat.label.trim(),icon:newCat.icon}]);setNewCat({label:"",icon:"📌"});}}}
                placeholder="類別名稱" style={{...inp,flex:1}}/>
              <button onClick={()=>{
                if(!newCat.label.trim())return;
                setFixedCats(p=>[...p,{id:"fc_"+Date.now(),label:newCat.label.trim(),icon:newCat.icon}]);
                setNewCat({label:"",icon:"📌"});
              }} style={{...btnPrimary,padding:"7px 16px"}}>新增</button>
            </div>
          </div>
        </div>
      </div>}

      {/* Delete account confirm */}
      {confirmDel&&<div style={{position:"fixed",inset:0,background:overlay,display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
        <div style={{background:C.surface,borderRadius:14,padding:24,width:280,textAlign:"center"}}>
          <div style={{fontSize:32,marginBottom:10}}>🗑️</div>
          <div style={{fontWeight:600,marginBottom:6}}>確定刪除「{confirmDel.label}」？</div>
          <div style={{fontSize:12,color:C.muted,marginBottom:18}}>歷史記錄中該帳戶的數字也會消失</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setConfirmDel(null)} style={{...btnSecondary,flex:1,textAlign:"center"}}>取消</button>
            <button onClick={()=>{setAccounts(p=>p.filter(a=>a.id!==confirmDel.id));setConfirmDel(null);}}
              style={{...btnPrimary,background:C.red,flex:1,textAlign:"center"}}>刪除</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
